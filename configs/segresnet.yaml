# Model configuration
model: segresnet
in_channels: 4       # T1, T1ce, T2, FLAIR
out_channels: 4      # background, necrotic core, edema, enhancing tumor

# Loss function
loss: dice_focal
focal_gamma: 2.0
dice_focal_lambda_dice: 0.5
dice_focal_lambda_focal: 0.5

# Training
lr: 1.0e-4
weight_decay: 1.0e-5
batch_size: 1
max_epochs: 150
val_interval: 10
num_workers: 8      # 8 is safe; 16 OOMs during NIfTI cache build on 32GB
persistent_workers: false
pin_memory: true
prefetch_factor: 4
seed: 42

# Patch-based training
patch_size: [128, 128, 128]
pos_neg_ratio: 1
num_samples: 2        # 2 patches/case → effective batch=2 → fits in 16GB VRAM

# Inference
sw_batch_size: 2
sw_overlap: 0.75      # increased from 0.5 for better boundary accuracy

# Data
# combined_manifest.csv = BraTS 2021 (1251) + UPenn-GBM (170) = 1421 cases
# MSD Task01: public download (4.87 GB) contains images only; labels not included.
# To add MSD, obtain the labeled release (~7 GB), then run prepare_msd.py → merge_manifests.py
dataset_format: csv
manifest: data/combined_manifest.csv
modality_keys: [t1, t1ce, t2, flair]
data_dir: data/raw/BraTS2021_Training_Data   # fallback if manifest not found
# cache_mode: persistent  = cache transforms to disk (default, zero RAM pressure)
# cache_mode: ram         = load everything into RAM (fast but needs 30-50 GB)
# cache_mode: none        = no caching (slowest)
cache_mode: "none"    # no disk cache; 32GB RAM keeps NIfTIs warm via OS page cache
cache_dir: data/cache/segresnet
output_dir: outputs
train_split: 0.8
val_split: 0.1

# Augmentation
augmentation:
  flip_prob: 0.5
  rotate90_prob: 0.5
  gaussian_noise_prob: 0.2
  gaussian_noise_std: 0.05
  intensity_scale_prob: 0.5
  intensity_scale_factor: 0.1
  intensity_shift_prob: 0.5
  intensity_shift_offset: 0.1

# Logging
use_wandb: false
wandb_project: brats-segmentation
log_interval: 10
