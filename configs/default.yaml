# Model configuration
model: unet          # Options: unet | attention_unet | segresnet
in_channels: 4       # must equal len(modality_keys)
out_channels: 4      # background, necrotic core, edema, enhancing tumor

# Loss function
loss: dice_focal     # Options: dice | focal | dice_focal
focal_gamma: 2.0
dice_focal_lambda_dice: 0.5
dice_focal_lambda_focal: 0.5

# Training
lr: 1.0e-4
weight_decay: 1.0e-5
batch_size: 2
max_epochs: 300
val_interval: 5
num_workers: 8      # 8 is safe on 32GB DDR5; 16 OOMs during initial NIfTI cache build (each worker decompresses full 240³ volumes simultaneously)
persistent_workers: false  # disabled — causes Windows DataLoader deadlocks with MONAI transforms
pin_memory: true           # DMA transfer to 5080 VRAM without extra CPU copy
prefetch_factor: 4         # buffer 4 batches per worker ahead of GPU to smooth utilization
grad_accum_steps: 4 # accumulate gradients over N micro-batches before optimizer step
seed: 42

# Patch-based training
patch_size: [128, 128, 128]
pos_neg_ratio: 1      # positive to negative sample ratio (1:1)
num_samples: 4        # patches per image per epoch step

# Inference
sw_batch_size: 8      # 5080 has 16GB VRAM — can run 8 sliding-window patches in parallel
sw_overlap: 0.75      # sliding window overlap ratio

# ──────────────────────────────────────────────────────────────────────────
# Dataset
# ──────────────────────────────────────────────────────────────────────────
# dataset_format controls how files are discovered:
#   brats  – scan data_dir for BraTS-style subdirectories (default)
#   csv    – load paths from a CSV manifest (set manifest below)
#   json   – load paths from a JSON manifest (set manifest below)
dataset_format: brats

# BraTS data directory (used when dataset_format: brats)
data_dir: data/raw/BraTS2021_Training_Data

# Manifest path (used when dataset_format: csv or json)
# manifest: data/preprocessed/manifest.csv

# Ordered list of modality keys.
#   BraTS 4-channel:   [t1, t1ce, t2, flair]
#   Single modality:   [image]
#   Custom 2-channel:  [t1, flair]
# Column names in CSV / JSON manifest must match these keys.
# in_channels must equal len(modality_keys).
modality_keys: [t1, t1ce, t2, flair]

cache_mode: persistent   # persistent (disk) | ram (CacheDataset) | none
cache_dir: data/cache
output_dir: outputs
train_split: 0.8
val_split: 0.1
# remaining 0.1 → test

# ──────────────────────────────────────────────────────────────────────────
# Online preprocessing  (applied in the MONAI transform pipeline at load time)
#
# For expensive operations (bias correction, resampling, co-registration,
# skull stripping) use preprocess.py to run them offline first, then point
# dataset_format + manifest at the preprocessed output.
# ──────────────────────────────────────────────────────────────────────────
preprocessing:
  # Crop each volume to the tight non-zero bounding box before patching.
  # Reduces wasted compute on air/background voxels.
  crop_foreground: true

  # Clip intensities to [clip_lower_pct, clip_upper_pct] percentile of
  # non-zero voxels before z-score normalization.  Removes outlier voxels
  # that would skew the mean/std.
  clip_intensities: true
  clip_lower_pct: 0.5
  clip_upper_pct: 99.5

  # Resample to a fixed voxel spacing using MONAI's Spacingd.
  # Useful when your dataset has mixed voxel spacings.
  # Set to true only if your volumes are NOT already at the same spacing;
  # for pre-resampled data (BraTS) keep this false.
  resample: false
  target_spacing: [1.0, 1.0, 1.0]

# ──────────────────────────────────────────────────────────────────────────
# Augmentation (training only)
# ──────────────────────────────────────────────────────────────────────────
augmentation:
  flip_prob: 0.5
  rotate90_prob: 0.5
  gaussian_noise_prob: 0.2
  gaussian_noise_std: 0.05
  intensity_scale_prob: 0.5    # random multiplicative contrast jitter
  intensity_scale_factor: 0.1  # ±10% scale
  intensity_shift_prob: 0.5    # random additive brightness jitter
  intensity_shift_offset: 0.1  # ±0.1 offset after z-score normalization

# ──────────────────────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────────────────────
use_wandb: false      # set true to enable W&B logging
wandb_project: brats-segmentation
log_interval: 10      # log every N iterations
